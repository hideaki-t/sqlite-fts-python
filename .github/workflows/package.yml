name: Python package

on: [push]
#  push:
#    branches: [ master ]
#  pull_request:
#    branches: [ master ]

jobs:
    build:
        runs-on: ${{ matrix.os }}
        continue-on-error: ${{ matrix.experimental }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
                python-version:
                    [
                        "3.10",
                        "3.11",
                        "3.12",
                        "3.13",
                        "3.14",
                        "3.14t",
                        "pypy3.11",
                    ]
                experimental: [false]
                include:
                    - python-version: "3.14"
                      os: windows-11-arm
                      experimental: false
                    - python-version: "3.14t"
                      os: windows-11-arm
                      experimental: false
                    - python-version: "3.15-dev"
                      os: ubuntu-latest
                      experimental: true
                    - python-version: "3.15-dev"
                      os: macos-latest
                      experimental: true
                    - python-version: "3.15-dev"
                      os: windows-latest
                      experimental: true
                    - python-version: "3.15-dev"
                      os: ubuntu-24.04-arm
                      experimental: true

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: ${{ matrix.python-version }}
                  allow-prereleases: true
                  cache: pip
            - name: tox-gh workaround for freethreaded(!windows)
              if: ${{ runner.os != 'Windows' && endsWith(matrix.python-version, 't') }}
              run: echo "TOX_GH_MAJOR_MINOR=${{ matrix.python-version }}" >> $GITHUB_ENV
            - name: tox-gh workaround for freethreaded(windows)
              if: ${{ runner.os == 'Windows' && endsWith(matrix.python-version, 't') }}
              run: echo "TOX_GH_MAJOR_MINOR=${{ matrix.python-version }}" >> $env:GITHUB_ENV
            - name: Install dependencies
              run: |
                  python3 -m pip install 'tox' 'tox-gh'
                  tox --version
            - name: Install native deps (Linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt update
                  sudo apt install -y mecab libmecab-dev mecab-ipadic-utf8
            - name: Test with tox
              run: |
                  tox
