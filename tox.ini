[tox]
envlist = {py310,py311,py312,py313,py314,py314t,pypy3}-{macos,win,linux},py313-apsw-linux
skip_missing_interpreters = true
requires =
tox>=4

[gh]
python =
    3.14t = py314t
    3.14 = py314
    3.13 = py313
    3.12 = py312
    3.11 = py311
    3.10 = py310

[testenv]
changedir = tests
passenv = PYTHONPATH
platform =
    win: win32
    linux: linux
    macos: darwin
deps =
    pytest
    igo-python
    janome
    tinysegmenter
    faker
    linux: mecab
    linux: natto-py
commands=
    py.test -svrx

[testenv:py313-apsw-linux]
commands=
    pip install apsw>=3.46.1.0
    py.test -svrx
